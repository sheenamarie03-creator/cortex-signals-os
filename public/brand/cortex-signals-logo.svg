<svg width="280" height="56" viewBox="0 0 280 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cortex Signals logo</title>
  <desc id="desc">Horizontal Cortex Signals wordmark with a neural signal mark in cyan, violet-blue, and restrained signal green.</desc>
  <rect width="280" height="56" rx="16" fill="none"/>
  <g filter="url(#softGlow)">
    <rect x="3" y="5" width="46" height="46" rx="14" fill="#07101A"/>
    <rect x="4" y="6" width="44" height="44" rx="13" stroke="url(#frame)" stroke-opacity="0.78" stroke-width="2"/>
    <path d="M13.5 31.5H18.5L20.9 22.8L25.2 38.4L29.4 17L32.5 31.5H38.5" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M18.8 20.8L26 15.2L34 20.8M18.8 35.2L26 40.8L34 35.2" stroke="#8F7CFF" stroke-opacity="0.5" stroke-width="1.35" stroke-linecap="round"/>
    <circle cx="18.8" cy="20.8" r="2.8" fill="#07101A" stroke="#36E8FF" stroke-width="1.55"/>
    <circle cx="34" cy="20.8" r="2.8" fill="#07101A" stroke="#8F7CFF" stroke-width="1.55"/>
    <circle cx="18.8" cy="35.2" r="2.8" fill="#07101A" stroke="#7CFFC7" stroke-width="1.55"/>
    <circle cx="34" cy="35.2" r="2.8" fill="#07101A" stroke="#36E8FF" stroke-width="1.55"/>
  </g>
  <text x="62" y="34" fill="url(#wordmark)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="21" font-weight="760" letter-spacing="0.3">Cortex Signals</text>
  <path d="M62 42H132" stroke="url(#baseline)" stroke-width="1.25" stroke-linecap="round" opacity="0.68"/>
  <path d="M141 42H151L153 38L156 46L159 36L161 42H174" stroke="#7CFFC7" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <defs>
    <filter id="softGlow" x="-5" y="-3" width="62" height="62" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.211765 0 0 0 0 0.909804 0 0 0 0 1 0 0 0 0.22 0"/>
      <feBlend in2="BackgroundImageFix" result="glow"/>
      <feBlend in="SourceGraphic" in2="glow" result="shape"/>
    </filter>
    <linearGradient id="frame" x1="7" y1="8" x2="46" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36E8FF"/>
      <stop offset="0.58" stop-color="#8F7CFF"/>
      <stop offset="1" stop-color="#7CFFC7"/>
    </linearGradient>
    <linearGradient id="pulse" x1="13.5" y1="17" x2="38.5" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36E8FF"/>
      <stop offset="0.6" stop-color="#8F7CFF"/>
      <stop offset="1" stop-color="#7CFFC7"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="62" y1="15" x2="208" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3F8FB"/>
      <stop offset="0.54" stop-color="#DFF9FF"/>
      <stop offset="1" stop-color="#36E8FF"/>
    </linearGradient>
    <linearGradient id="baseline" x1="62" y1="42" x2="132" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#36E8FF"/>
      <stop offset="1" stop-color="#8F7CFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
